<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWG - A Final Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050005;display:flex;align-items:center;justify-content:center;overflow:hidden}
.arena-bg{position:relative;width:720px;height:540px;overflow:hidden;font-family:'Exo 2','Segoe UI',sans-serif;border-radius:4px;box-shadow:0 0 80px rgba(0,0,0,0.95),0 0 160px rgba(0,0,0,0.7)}
.bg-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;z-index:0}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.02) 25%,rgba(0,0,0,0.35) 58%,rgba(0,0,0,0.9) 100%);z-index:1}
canvas#embers{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
.corner-accent{position:absolute;width:66px;height:66px;pointer-events:none;z-index:10}
.ca-tl{top:10px;left:10px}.ca-tr{top:10px;right:10px;transform:scaleX(-1)}.ca-bl{bottom:10px;left:10px;transform:scaleY(-1)}.ca-br{bottom:10px;right:10px;transform:scale(-1,-1)}
.title-block{position:absolute;top:0;left:0;right:0;text-align:center;padding:20px 20px 6px;z-index:10}
.swg-label{font-size:11px;font-weight:300;letter-spacing:9px;color:rgba(255,185,85,0.8);text-transform:uppercase;margin-bottom:2px;text-shadow:0 1px 8px rgba(0,0,0,0.95)}
.arena-title{font-family:'Bebas Neue','Impact',sans-serif;font-size:0px;letter-spacing:6px;line-height:1;color:transparent}
.deco-bar{position:absolute;top:56px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:12px;padding:0 32px;z-index:10;pointer-events:none}
.deco-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,70,0,0.28),transparent)}
.deco-text{font-size:9px;letter-spacing:4px;color:rgba(210,85,25,0.45);text-transform:uppercase;text-shadow:0 1px 5px rgba(0,0,0,0.9)}
.main-panel{position:absolute;bottom:0;left:0;right:0;margin:0 20px 14px;background:rgba(7,2,0,0.9);border:1px solid rgba(200,70,0,0.48);border-radius:3px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:10;box-shadow:0 0 32px rgba(150,38,0,0.22),inset 0 0 55px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,85,0,0.13)}
.panel-top-edge{height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,95,0,0.38) 30%,rgba(255,165,0,0.6) 50%,rgba(255,95,0,0.38) 70%,transparent 100%)}
.panel-inner{padding:14px 18px 10px}
.btn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px}
.arena-btn{padding:8px 4px;background:rgba(32,9,1,0.93);border:1px solid rgba(145,48,0,0.46);border-radius:3px;color:rgba(232,188,128,0.9);font-family:'Exo 2','Segoe UI',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-align:center;cursor:pointer;transition:all .18s ease;user-select:none}
.arena-btn:hover{background:rgba(165,52,0,0.3);border-color:rgba(255,90,0,0.8);color:#ffcc80;box-shadow:0 0 10px rgba(195,72,0,0.38)}
.arena-btn.is-active{background:rgba(155,48,0,0.88);border-color:#ff8800;color:#fff4e8;box-shadow:0 0 16px rgba(255,95,0,0.55),inset 0 0 9px rgba(255,75,0,0.22)}
.sep-line{height:1px;background:linear-gradient(90deg,transparent,rgba(175,58,0,0.44),transparent);margin:0 0 9px}
.row-btns{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.launch-btn{padding:10px 4px;font-size:12px;letter-spacing:2px}
.status-bar{background:rgba(5,1,0,0.97);border-top:1px solid rgba(148,44,0,0.36);padding:9px 18px;display:flex;align-items:center;gap:12px;border-radius:0 0 3px 3px}
.ready-dot{width:7px;height:7px;border-radius:50%;background:#ff8800;box-shadow:0 0 8px #ff6600;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px #ff6600}50%{opacity:0.42;box-shadow:0 0 3px #ff3300}}
.ready-text{font-size:11px;font-weight:700;letter-spacing:3.5px;color:#ffaa00;text-transform:uppercase;text-shadow:0 0 10px rgba(255,138,0,0.7);white-space:nowrap}
.progress-wrap{flex:1;height:3px;background:rgba(88,23,0,0.52);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#cc3e00,#ffaa00,#ffe068);box-shadow:0 0 10px rgba(255,96,0,0.88);border-radius:2px;transition:width .05s linear}
.ver-tag{font-size:10px;color:rgba(198,88,28,0.5);letter-spacing:1px;white-space:nowrap}
</style>
</head>

<script>
(function(){
  const bg=document.getElementById('arenaBg');
  const canvas=document.getElementById('embers');
  canvas.width=bg.offsetWidth; canvas.height=bg.offsetHeight;
  const ctx=canvas.getContext('2d');
  const particles=[];
  function mk(b){const x=Math.random()*canvas.width,y=b?canvas.height+8:Math.random()*canvas.height,life=b?0:Math.random()*140,ml=90+Math.random()*130,t=Math.random();let c;if(t<0.5)c=a=>`rgba(255,${50+Math.floor(Math.random()*85)},0,${a})`;else if(t<0.8)c=a=>`rgba(255,${155+Math.floor(Math.random()*75)},${Math.floor(Math.random()*22)},${a})`;else c=a=>`rgba(${165+Math.floor(Math.random()*62)},${Math.floor(Math.random()*12)},0,${a})`;return{x,y,vx:(Math.random()-.5)*.5,vy:-(0.28+Math.random()*.92),size:Math.random()*1.8+0.4,alpha:.5+Math.random()*.48,life,maxLife:ml,c};}
  for(let i=0;i<65;i++)particles.push(mk(false));
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(Math.random()<.28)particles.push(mk(true));
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life++;const fade=p.life<18?p.life/18:p.life>p.maxLife-22?(p.maxLife-p.life)/22:1,a=p.alpha*fade;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.c(a);ctx.fill();if(p.size>1){ctx.beginPath();ctx.arc(p.x,p.y,p.size*2,0,Math.PI*2);ctx.fillStyle=p.c(a*.1);ctx.fill();}if(p.life>=p.maxLife||p.y<-12)particles.splice(i,1);}
    while(particles.length<60)particles.push(mk(true));
    requestAnimationFrame(animate);}
  animate();
  let prog=0,filling=true;
  const fill=document.getElementById('progFill');
  setInterval(()=>{if(filling){prog+=.18+Math.random()*.42;if(prog>=100){prog=100;filling=false;setTimeout(()=>{prog=0;filling=true;},1500);}}fill.style.width=prog+'%';},55);
  document.querySelectorAll('.arena-btn').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('.arena-btn').forEach(x=>x.classList.remove('is-active'));this.classList.add('is-active');});});
})();
</script>
